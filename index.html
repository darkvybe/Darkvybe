<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARKVYBE STORE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:60px 20px;
  background:black;
}

header h1{
  font-size:55px;
  letter-spacing:5px;
}

header p{
  color:#aaa;
}

/* PRODUCTS */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  background:#151515;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content{
  text-align:center;
  padding:10px;
}

.price{
  color:#aaa;
  margin:5px 0;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.add{
  background:white;
  color:black;
}

/* CART */
.cart{
  position:fixed;
  right:10px;
  top:10px;
  background:#1a1a1a;
  padding:12px;
  width:220px;
  border-radius:10px;
}

.cart button{
  width:100%;
  margin-top:10px;
  background:#25D366;
  color:white;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  color:#666;
}
</style>

</head>

<body>

<header>
  <h1>DARKVYBE</h1>
  <p>Streetwear Identity • Minimal • Bold</p>
</header>

<!-- CART -->
<div class="cart">
  <h3>🛒 Cart</h3>
  <ul id="list"></ul>
  <p>Total: <span id="count">0</span></p>
  <button onclick="checkout()">Order WhatsApp</button>
</div>

<!-- PRODUCTS -->
<div class="container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975682031-ae4b2b3c4d5e">
    <div class="card-content">
      <h3>Dark Tee</h3>
      <div class="price">150 MAD</div>
      <button class="add" onclick="add('Dark Tee')">Add to Cart</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975922284-ae4b2b3c4d5e">
    <div class="card-content">
      <h3>Minimal Tee</h3>
      <div class="price">150 MAD</div>
      <button class="add" onclick="add('Minimal Tee')">Add to Cart</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975951234-ae4b2b3c4d5e">
    <div class="card-content">
      <h3>Street Drop</h3>
      <div class="price">180 MAD</div>
      <button class="add" onclick="add('Street Drop')">Add to Cart</button>
    </div>
  </div>

</div>

<footer>
  © 2026 DARKVYBE
</footer>

<script>

let cart = [];

function add(item){
  cart.push(item);
  update();
}

function update(){
  document.getElementById("list").innerHTML =
  cart.map(i=>`<li>${i}</li>`).join("");

  document.getElementById("count").innerText = cart.length;
}

function checkout(){
  let msg = "Order:%0A" + cart.join("%0A");
  window.open("https://wa.me/212600000000?text="+msg,"_blank");
}

</script>

</body>
</html>
